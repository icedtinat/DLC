<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AuthKit Hero Canvas Extract</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="hero">
      <canvas id="particle-canvas" aria-hidden="true"></canvas>
      <div class="hero__spotlights" aria-hidden="true">
        <div class="spotlight spotlight--left"></div>
        <div class="spotlight spotlight--center"></div>
        <div class="spotlight spotlight--right"></div>
      </div>
      <div class="hero__grid" aria-hidden="true"></div>
      <div class="hero__content">
        <p class="eyebrow">Introducing</p>
        <h1>AuthKit</h1>
        <p class="subtitle">Extracted 2D canvas particle field from authkit.com</p>
      </div>
    </main>
    <script type="module" src="./script.js"></script>
  </body>
</html>
